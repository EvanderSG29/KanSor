name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt‑in Node 24

    steps:
    - uses: actions/checkout@v4  # gunakan versi terbaru (v4.1+ mendukung Node 24)

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'          # sesuaikan dengan versi yang dipilih
        tools: composer:v2
        extensions: mbstring, bcmath, pdo, sqlite3
        coverage: none

    - name: Validate composer files
      run: composer validate --strict

    - name: Get Composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: Copy environment file
      run: cp .env.testing .env

    - name: Generate key and migrate
      run: |
        php artisan key:generate
        php artisan migrate --force

    - name: Install NPM dependencies
      run: npm install --no-package-lock

    - name: Build assets
      run: npm run build

    - name: Run tests
      run: php artisan test --compact